# PATH: wissen/hugo.prod.toml
# Version: 2026-02-22T00:00:00Z
# Purpose: Production build config (used by GitHub Actions Build & Deploy)
# Change (PR-4.3 Hotfix): Map section "faq" permalinks to /info/ to match guards and UI rename.

baseURL = "https://www.vertaefelungen.de/wissen/"
title = "Wissensdatenbank | Vertäfelung & Lambris"
defaultContentLanguage = "de"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
canonifyURLs = true
relativeURLs = false
ignoreFiles = [".*faq/restaurierung/index\\.md$"]

[pagination]
  pagerSize = 10

[languages]

  [languages.de]
    languageName = "Deutsch"
    weight = 1
    contentDir = "content/de"
    [languages.de.params]
      locale = "de_DE"

  [languages.en]
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    [languages.en.params]
      locale = "en_GB"

[languages.de.permalinks]
  produkte = "/:sections/:slug/"
  faq = "/info/:sections/:slug/"

[languages.en.permalinks]
  products = "/:sections/:slug/"
  faq = "/info/:sections/:slug/"

[markup.goldmark.renderer]
  unsafe = true
